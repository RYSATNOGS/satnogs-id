version: 2

updates:
  # Python dependencies in pyproject.toml and the M0 requirements file
  - package-ecosystem: "pip"
    directories:
      - "/"
      - "/notebooks/m0"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Paris"
    versioning-strategy: "increase"
    groups:
      python-dependencies:
        patterns:
          - "*"

  # Base images in the root and notebook Dockerfiles
  - package-ecosystem: "docker"
    directories:
      - "/"
      - "/notebooks/m0"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Paris"
    groups:
      docker-images:
        patterns:
          - "*"

  # Actions used by .github/workflows/mirror.yml
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Paris"
    groups:
      github-actions:
        patterns:
          - "*"
